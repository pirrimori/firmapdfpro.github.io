<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FirmaPDF Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

:root {
    --bg: #020617;
    --glass: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.08);
    --text: #e2e8f0;
    --primary: #3b82f6;
    --accent: #22c55e;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    background: radial-gradient(circle at 20% 20%, #0f172a, #020617);
    overflow-x: hidden;
}

/* FONDO ANIMADO */
.bg-glow {
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(59,130,246,0.4), transparent);
    filter: blur(120px);
    top: -100px;
    left: -100px;
    animation: move 10s infinite alternate;
}

@keyframes move {
    0% { transform: translate(0,0);}
    100% { transform: translate(200px,150px);}
}

/* CONTAINER */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

/* HERO */
.hero {
    text-align: center;
    margin-top: 40px;
}

.logo {
    width: 180px;
    filter: drop-shadow(0 0 40px rgba(59,130,246,0.6));
    animation: float 4s infinite ease-in-out;
}

@keyframes float {
    50% { transform: translateY(-10px);}
}

h1 {
    font-size: 2.5rem;
    margin: 10px 0;
}

.subtitle {
    color: #94a3b8;
    font-size: 0.95rem;
}

/* GRID */
.grid {
    display: grid;
    gap: 20px;
    margin-top: 30px;
}

/* GLASS CARD */
.card {
    background: var(--glass);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    border: 1px solid var(--border);
    padding: 20px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px) scale(1.02);
    border-color: rgba(59,130,246,0.5);
}

/* FEATURES */
.features {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 10px;
}

.feature {
    padding: 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    font-size: 0.8rem;
}

/* SCREEN */
.screen img {
    width: 100%;
    border-radius: 15px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

/* BOTON */
.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 25px;
    border-radius: 999px;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    color: white;
    text-decoration: none;
    font-weight: 600;
    box-shadow: 0 0 20px rgba(59,130,246,0.6);
}

/* PRICING */
.price {
    text-align: center;
    border: 1px solid rgba(34,197,94,0.5);
}

/* DESKTOP */
@media (min-width:768px) {
    .grid {
        grid-template-columns: 1.2fr 1fr;
    }
}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="container">

    <!-- HERO -->
    <div class="hero">
        <img src="./img/logo.png" class="logo">
        <h1>FirmaPDF Pro</h1>
        <p class="subtitle">
            Firma PDFs con nivel profesional.  
            100% privado · Sin conexión · Sin anuncios
        </p>

        <a href="#" class="btn">Descargar</a>
    </div>

    <!-- GRID -->
    <div class="grid">

        <!-- FEATURES -->
        <div class="card">
            <h3>Funciones</h3>

            <div class="features">
                <div class="feature">🔐 Contraseña</div>
                <div class="feature">🛑 Anti-edición</div>
                <div class="feature">📄 Certificado FNMT</div>
                <div class="feature">✍️ Firma manual</div>
                <div class="feature">🚫 Sin anuncios</div>
                <div class="feature">📡 Offline total</div>
            </div>

            <hr style="opacity:0.1;margin:15px 0;">

            <p style="font-size:0.85rem;color:#94a3b8;">
                Importa → Firma → Protege → Guarda
            </p>
        </div>

        <!-- SCREEN -->
        <div class="card screen">
            <img src="./img/1.jpg">
        </div>

        <!-- SCREEN -->
        <div class="card screen">
            <img src="./img/2.jpg">
        </div>

        <!-- PRICING -->
        <div class="card price">
            <h3>Pro</h3>
            <p><strong>3.99€</strong></p>
            <p>Firmas ilimitadas</p>
        </div>

    </div>

</div>

</body>
</html>
